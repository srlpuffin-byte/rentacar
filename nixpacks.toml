[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x", "openssl", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["npm install -g pnpm && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/db run build 2>/dev/null || true",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
