kind = "web"
previewPath = "/"
title = "RentAuto"
version = "1.0.0"
id = "artifacts/rentauto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22936

[services.development]
run = "pnpm --filter @workspace/rentauto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rentauto", "run", "build" ]
publicDir = "artifacts/rentauto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22936"
BASE_PATH = "/"
